server.error.whitelabel.enabled=false
spring.devtools.add-properties=false
# Optional local overrides (gitignored): put openai.api.key here so IDE runs pick it up
spring.config.import=optional:file:./application-local.properties
# Root WARN hides Spring Boot's "Started ...Application" (INFO). Keep boot startup visible:
logging.level.org.springframework.boot=INFO
logging.level.com.husky.spring_portfolio=INFO
logging.level.root=warn
logging.level.com.husky.spring_portfolio.mvc.jwt=INFO
logging.level.com.husky.spring_portfolio.mvc.chatLLM=WARN

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# Dev: ddl-auto=update adds new columns automatically for new entity fields (e.g. pipelineStatus, outcomeStatus, complianceLabel, remediationPlanJson). Use validate/none in production and migrations instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.datasource.url = jdbc:sqlite:volumes/sqlite.db
spring.datasource.driver-class-name = org.sqlite.JDBC
spring.datasource.username = admin
spring.datasource.password = admin
# Avoid indefinite waits if the DB file is locked or the pool is exhausted
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.main.allow-bean-definition-overriding=true

server.port=8085

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
spring.servlet.multipart.file-size-threshold=2MB

jwt.secret=bmlnaHRoYXdrY29kaW5nc29jaWV0eWFwY29tcHV0ZXJzY2llbmNlYQ==

# PDF Accessibility Processing Configuration
app.upload.dir=${user.dir}/volumes/uploads
# OpenAI: read from env by default; override below or via OPENAI_API_KEY / OPENAI_MODEL
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o}
# Stage 1: document context → remediation plan (leave empty to use openai.model when you implement the call)
openai.plan.model=${OPENAI_PLAN_MODEL:}
# Stage 2: original content + plan → altered HTML via LLM (empty = skip LLM, use deterministic HTML from plan)
openai.alt.model=${OPENAI_ALT_MODEL:}
# Examples (do not commit real keys; use env or a local override):
# openai.api.key=sk-your-key-here
# openai.model=gpt-4o
# openai.model=ft:gpt-4o-2024-08-06:your-org:pdf-alttext:1

# Links in password-reset emails (no trailing slash)
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5500}
app.mail.from=${APP_MAIL_FROM:noreply@localhost}

# Optional: set spring.mail.host (and username/password) to send mail. If unset, emails are skipped (logged).
